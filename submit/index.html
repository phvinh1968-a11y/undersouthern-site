<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>submit your music</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/phvinh1968-a11y/my-images/main/logoblack.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap');

        :root {
            --bg-color: #ffffff;
            --text-main: #000000;
            --text-dim: #888888;
            --accent: #000000;
            --border-color: #dddddd;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            line-height: 1.6;
            text-transform: lowercase;
        }

        /* THIẾT LẬP TO VÀ FULL MÀN HÌNH TRÊN MÁY TÍNH */
        .container {
            width: 90%; 
            max-width: 1400px; 
            margin: 0 auto;
            padding: 40px 0;
        }

        header { 
            text-align: center;
            margin-bottom: 50px; 
        }

        .header-logo {
            width: 100px; 
            margin-bottom: -10px;
            /* Đã bỏ filter invert để logo hiện màu đen gốc trên nền trắng */
            transition: transform 0.3s ease;
        }

        .header-logo:hover { transform: scale(1.1); }

        h1 {
            font-size: clamp(32px, 5vw, 64px); 
            font-weight: 500;
            letter-spacing: -3px;
            margin: 0 0 10px 0;
        }

        .desc { color: var(--text-dim); font-size: 16px; }

        form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .full-width { grid-column: span 2; }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        input, select, textarea {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 15px;
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            text-transform: none;
            width: 100%;
            box-sizing: border-box;
        }

        select:invalid { color: var(--text-dim); }

        select option {
            background-color: #ffffff;
            color: black;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--text-main);
            background: rgba(0,0,0,0.02);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            /* Đã bỏ filter invert để icon lịch hiện màu đen */
            cursor: pointer;
        }

        textarea {
            resize: vertical;
            min-height: 50px;
        }

        .file-input-wrapper {
            position: relative;
            border: 1px dashed var(--border-color);
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
        }

        .file-input-wrapper span { font-size: 12px; }

        .file-input-wrapper:hover {
            border-color: var(--text-main);
            background: #f9f9f9;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .submit-area {
            margin-top: 30px;
            grid-column: span 2;
        }

        .btn-submit {
            width: 100%;
            background: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 22px;
            font-family: 'Fira Code', monospace;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 18px;
            text-transform: lowercase;
        }

        .btn-submit:hover:not(:disabled) {
            background: #333333;
            letter-spacing: 2px;
        }

        .btn-submit:disabled {
            background: #eeeeee;
            cursor: not-allowed;
            color: #bbbbbb;
        }

        footer {
            margin-top: 80px;
            border-top: 1px solid var(--border-color);
            padding: 30px 0;
            font-size: 12px;
            color: var(--text-dim);
            text-align: center;
            text-transform: none;
        }

        @media (max-width: 900px) {
            .container { width: 95%; }
            form { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .submit-area { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">

        </div>

            <input type="text" name="feat_artist">
        </div>

            <label>composer *</label>

            <input type="text" name="producer" required>
        </div>

        <div class="field-group">

            <select name="genre" required>

                <option value="Alternative Rock">Alternative Rock</option>
                <option value="Alternativo & Rock Latino">Alternativo & Rock Latino</option>
                <option value="Anime">Anime</option>

                <option value="Children's">Children's</option>
                <option value="Chinese">Chinese</option>

                <option value="Instrumental">Instrumental</option>
                <option value="J-Pop">J-Pop</option>
                <option value="Jazz">Jazz</option>
                <option value="K-Pop">K-Pop</option>
                <option value="Karaoke">Karaoke</option>

            <div class="file-input-wrapper">

            <label id="artwork-label">upload artwork*</label>
            <div class="file-input-wrapper">
                <span id="artwork-name">3000x3000px jpg</span>

            </div>
        </div>

        <div class="field-group full-width">
            <label>notes to label</label>
            <textarea name="notes" rows="3" placeholder="Include a music preview (15–60 seconds), any important information about the song, and a link to your artist's Spotify page (if available)."></textarea>
        </div>

        <div class="submit-area">
            <button type="submit" class="btn-submit">submit to undersouthern</button>
        </div>

    <footer>
        © UNDERSOUTHERN. All Rights Reserved.

</div>

<script>
    const SUPABASE_URL = 'https://wbktbxfryhjesvewoots.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Cap8ZDxhSSbgcglSbNHlzw_NY2XDLsl';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function sanitizeFileName(name) {
        return name.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/Đ/g, 'D').replace(/[^a-zA-Z0-9.\-_]/g, '_').substring(0, 50); 
    }

    function updateFileName(input, targetId) {
        const fileName = input.files[0] ? input.files[0].name : "chọn file";
        document.getElementById(targetId).innerText = fileName.toLowerCase();
    }

    const form = document.getElementById('submissionForm');
    const btnSubmit = document.querySelector('.btn-submit');

    form.onsubmit = async (e) => {
        e.preventDefault();
        btnSubmit.disabled = true;
        btnSubmit.innerText = "uploading...";

        try {
            const formData = new FormData(form);
            const audioFile = formData.get('audio');
            const artworkFile = formData.get('artwork');

            const safeAudioName = `${Date.now()}_${sanitizeFileName(audioFile.name)}`;
            const safeArtName = `${Date.now()}_${sanitizeFileName(artworkFile.name)}`;

            await _supabase.storage.from('audio').upload(safeAudioName, audioFile);
            await _supabase.storage.from('artwork').upload(safeArtName, artworkFile);

            await _supabase.from('submit').insert([{
                email: formData.get('email'),
                song_name: formData.get('song_name'),
                version: formData.get('version'),
                main_artist: formData.get('main_artist'),
                feat_artist: formData.get('feat_artist'),
                composer: formData.get('composer'),
                producer: formData.get('producer'),
                genre: formData.get('genre'),
                language: formData.get('language'),
                release_date: formData.get('release_date') || null,
                lyrics: formData.get('lyrics'),
                audio_url: safeAudioName,
                artwork_url: safeArtName,
                notes: formData.get('notes')
            }]);

            alert("sent successfully!");
            form.reset();
            document.getElementById('audio-name').innerText = "wav 16 bit 44.1 khz";
            document.getElementById('artwork-name').innerText = "3000x3000px jpg";

        } catch (err) {
            alert("lỗi: " + err.message);
        } finally {
            btnSubmit.disabled = false;
            btnSubmit.innerText = "submit to undersouthern";
        }
    };
</script>
