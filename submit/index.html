<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Your Music</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/phvinh1968-a11y/my-images/main/logoblack.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap');

        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-dim: #666666;
            --accent: #ffffff;
            --border-color: #222222;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header { 
            text-align: center;
            margin-bottom: 60px; 
        }

        .header-logo {
            width: 80px;
            margin-bottom: 30px;
            filter: brightness(0) invert(1);
            transition: transform 0.3s ease;
        }

        .header-logo:hover {
            transform: scale(1.1);
        }

        h1 {
            font-size: clamp(32px, 4vw, 48px);
            font-weight: 500;
            letter-spacing: -2px;
            margin: 0 0 10px 0;
            text-transform: lowercase;
        }

        .desc { color: var(--text-dim); font-size: 14px; }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .full-width { grid-column: span 2; }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        input, select, textarea {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 12px;
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        select option {
            background-color: #111;
            color: white;
        }

        textarea {
            resize: vertical;
            min-height: 45px;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--text-main);
        }

        /* Ô UPLOAD THU NHỎ - KHÔNG ICON */
        .file-input-wrapper {
            position: relative;
            border: 1px dashed var(--border-color);
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 45px;
        }

        .file-input-wrapper span {
            font-size: 11px;
            display: block;
            line-height: 1.2;
        }

        .file-input-wrapper:hover {
            border-color: var(--text-main);
            background: #0a0a0a;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .submit-area {
            margin-top: 40px;
            grid-column: span 2;
        }

        .btn-submit {
            width: 100%;
            background: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 18px;
            font-family: 'Fira Code', monospace;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover:not(:disabled) {
            background: #cccccc;
            letter-spacing: 2px;
        }

        .btn-submit:disabled {
            background: #444;
            cursor: not-allowed;
            color: #888;
        }

        footer {
            margin-top: 100px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
        }

        @media (max-width: 600px) {
            form { grid-template-columns: 1fr; }
            .full-width, .submit-area { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="https://undersouthern.asia">

        </a>
        <h1>submit release</h1>

                <option value="Brazilian">Brazilian</option>
                <option value="C-Pop">C-Pop</option>
                <option value="Cantopop/HK-Pop">Cantopop/HK-Pop</option>
                <option value="Children's">Children's</option>
                <option value="Chinese">Chinese</option>

                <option value="Classical">Classical</option>

            <label id="artwork-label">Upload Artwork (JPG/PNG) *</label>
            <div class="file-input-wrapper">

                <input type="file" name="artwork" accept="image/*" required onchange="updateFileName(this, 'artwork-name')">
            </div>
        </div>

        <div class="field-group full-width">
            <label>Notes to Label</label>
            <textarea name="notes" rows="3" placeholder="Include a music preview (15–60 seconds), any important information about the song, and a link to your artist's Spotify page (if available)."></textarea>

</div>

<script>
    const SUPABASE_URL = 'https://wbktbxfryhjesvewoots.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Cap8ZDxhSSbgcglSbNHlzw_NY2XDLsl';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function sanitizeFileName(name) {
        return name
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '') 
            .replace(/đ/g, 'd').replace(/Đ/g, 'D')
            .replace(/[^a-zA-Z0-9.\-_]/g, '_') 
            .substring(0, 50); 
    }

    function updateFileName(input, targetId) {
        const fileName = input.files[0] ? input.files[0].name : "Chọn file";
        document.getElementById(targetId).innerText = fileName;
    }

    const form = document.getElementById('submissionForm');
    const btnSubmit = document.querySelector('.btn-submit');

    form.onsubmit = async (e) => {
        e.preventDefault();
        btnSubmit.disabled = true;
        btnSubmit.innerText = "UPLOADING...";

        try {
            const formData = new FormData(form);
            const audioFile = formData.get('audio');
            const artworkFile = formData.get('artwork');

            const safeAudioName = `${Date.now()}_${sanitizeFileName(audioFile.name)}`;
            const safeArtName = `${Date.now()}_${sanitizeFileName(artworkFile.name)}`;

            const { error: audioErr } = await _supabase.storage.from('audio').upload(safeAudioName, audioFile);
            if (audioErr) throw audioErr;

            const { error: artworkErr } = await _supabase.storage.from('artwork').upload(safeArtName, artworkFile);
            if (artworkErr) throw artworkErr;

            const { error: dbErr } = await _supabase.from('submit').insert([{
                email: formData.get('email'),
                song_name: formData.get('song_name'),
                version: formData.get('version'),
                main_artist: formData.get('main_artist'),
                feat_artist: formData.get('feat_artist'),
                composer: formData.get('composer'),
                producer: formData.get('producer'),
                genre: formData.get('genre'),
                language: formData.get('language'),
                release_date: formData.get('release_date') || null,
                lyrics: formData.get('lyrics'),
                audio_url: safeAudioName,
                artwork_url: safeArtName,
                notes: formData.get('notes')
            }]);

            if (dbErr) throw dbErr;

            alert("Gửi thành công! Chào mừng bạn đến với UNDERSOUTHERN.");
            form.reset();
            document.getElementById('audio-name').innerText = "Stereo 16 bit 44.1 kHz";
            document.getElementById('artwork-name').innerText = "3000x3000px - JPG, PNG";

        } catch (err) {
            alert("Lỗi: " + err.message);
        } finally {
            btnSubmit.disabled = false;
            btnSubmit.innerText = "Submit to Undersouthern";
        }
    };
</script>
