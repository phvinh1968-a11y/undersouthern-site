<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBMIT RELEASE – UNDERSOUTHERN</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/phvinh1968-a11y/my-images/main/logoblack.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap');

        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-dim: #666666;
            --accent: #ffffff;
            --border-color: #222222;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        header { margin-bottom: 60px; }

        .back-link {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 13px;
            transition: 0.3s;
            display: inline-block;
            margin-bottom: 20px;
        }

        .back-link:hover { color: var(--text-main); }

        h1 {
            font-size: clamp(32px, 4vw, 48px);
            font-weight: 500;
            letter-spacing: -2px;
            margin: 0 0 10px 0;
        }

        .desc { color: var(--text-dim); font-size: 14px; }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .full-width { grid-column: span 2; }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        input, select, textarea {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 12px;
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--text-main);
        }

        .file-input-wrapper {
            position: relative;
            border: 1px dashed var(--border-color);
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .file-input-wrapper:hover {
            border-color: var(--text-main);
            background: #0a0a0a;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .submit-area {
            margin-top: 40px;
            grid-column: span 2;
        }

        .btn-submit {
            width: 100%;
            background: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 18px;
            font-family: 'Fira Code', monospace;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover:not(:disabled) {
            background: #cccccc;
            letter-spacing: 2px;
        }

        .btn-submit:disabled {
            background: #444;
            cursor: not-allowed;
            color: #888;
        }

        footer {
            margin-top: 100px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
        }

        @media (max-width: 600px) {
            form { grid-template-columns: 1fr; }
            .full-width, .submit-area { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="index.html" class="back-link">← back to home</a>
        <h1>Submit Release</h1>
        <p class="desc">Điền đầy đủ thông tin bên dưới để gửi bản thảo âm nhạc của bạn tới UNDERSOUTHERN.</p>
    </header>

    <form id="submissionForm">
        <div class="field-group full-width">
            <label>Email Address *</label>
            <input type="email" name="email" placeholder="artist@example.com" required>
        </div>

        <div class="field-group">
            <label>Song Name *</label>
            <input type="text" name="song_name" required>
        </div>

        <div class="field-group">
            <label>Title Version</label>
            <input type="text" name="version" placeholder="Original / Remix">
        </div>

        <div class="field-group">
            <label>Main Artist *</label>
            <input type="text" name="main_artist" required>
        </div>

        <div class="field-group">
            <label>Featured Artist</label>
            <input type="text" name="feat_artist">
        </div>

        <div class="field-group">
            <label>Composer *</label>
            <input type="text" name="composer" required>
        </div>

        <div class="field-group">
            <label>Producer *</label>
            <input type="text" name="producer" required>
        </div>

        <div class="field-group">
            <label>Main Genre *</label>
            <select name="genre" required>
                <option value="">Select Genre</option>
                <option value="Pop">Pop</option>
                <option value="Hip-hop">Hip-hop / Rap</option>
                <option value="Electronic">Electronic / Dance</option>
                <option value="Indie">Indie</option>
                <option value="R&B">R&B</option>
            </select>
        </div>

        <div class="field-group">
            <label>Language *</label>
            <input type="text" name="language" placeholder="Vietnamese, English...">
        </div>

        <div class="field-group">
            <label>Release Date (Expected)</label>
            <input type="date" name="release_date">
        </div>

        <div class="field-group full-width">
            <label>Lyrics</label>
            <textarea name="lyrics" rows="6" placeholder="Paste your lyrics here..."></textarea>
        </div>

        <div class="field-group">
            <label id="audio-label">Upload Audio (WAV/MP3) *</label>
            <div class="file-input-wrapper">
                <i class="fa-solid fa-music"></i><br>
                <span id="audio-name">Choose File</span>
                <input type="file" name="audio" accept="audio/*" required onchange="updateFileName(this, 'audio-name')">
            </div>
        </div>

        <div class="field-group">
            <label id="artwork-label">Upload Artwork (JPG/PNG) *</label>
            <div class="file-input-wrapper">
                <i class="fa-solid fa-image"></i><br>
                <span id="artwork-name">Choose Image</span>
                <input type="file" name="artwork" accept="image/*" required onchange="updateFileName(this, 'artwork-name')">
            </div>
        </div>

        <div class="field-group full-width">
            <label>Notes to Label</label>
            <textarea name="notes" rows="3" placeholder="Anything else we should know?"></textarea>
        </div>

        <div class="submit-area">
            <button type="submit" class="btn-submit">Submit to Undersouthern</button>
        </div>
    </form>

    <footer>
        © UNDERSOUTHERN. Independent Music Distribution.
    </footer>
</div>

<script>
    // 1. Cấu hình Supabase (Dùng Project URL và Key bạn cung cấp)
    const SUPABASE_URL = 'https://wbktbxfryhjesvewoots.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Cap8ZDxhSSbgcglSbNHlzw_NY2XDLsl';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Cập nhật tên file khi chọn
    function updateFileName(input, targetId) {
        const fileName = input.files[0] ? input.files[0].name : "Choose File";
        document.getElementById(targetId).innerText = fileName;
    }

    // 2. Xử lý Gửi Form
    const form = document.getElementById('submissionForm');
    const btnSubmit = document.querySelector('.btn-submit');

    form.onsubmit = async (e) => {
        e.preventDefault();
        
        btnSubmit.disabled = true;
        const originalText = btnSubmit.innerText;
        btnSubmit.innerText = "UPLOADING DATA...";

        try {
            const formData = new FormData(form);
            const audioFile = formData.get('audio');
            const artworkFile = formData.get('artwork');

            // A. Upload Audio vào bucket 'assets'
            const audioPath = `audio/${Date.now()}_${audioFile.name}`;
            const { error: audioErr } = await _supabase.storage
                .from('assets')
                .upload(audioPath, audioFile);
            if (audioErr) throw audioErr;

            // B. Upload Artwork vào bucket 'assets'
            const artworkPath = `artwork/${Date.now()}_${artworkFile.name}`;
            const { error: artworkErr } = await _supabase.storage
                .from('assets')
                .upload(artworkPath, artworkFile);
            if (artworkErr) throw artworkErr;

            // C. Lưu thông tin vào bảng 'submissions'
            const { error: dbErr } = await _supabase
                .from('submissions')
                .insert([{
                    email: formData.get('email'),
                    song_name: formData.get('song_name'),
                    version: formData.get('version'),
                    main_artist: formData.get('main_artist'),
                    feat_artist: formData.get('feat_artist'),
                    composer: formData.get('composer'),
                    producer: formData.get('producer'),
                    genre: formData.get('genre'),
                    language: formData.get('language'),
                    release_date: formData.get('release_date'),
                    lyrics: formData.get('lyrics'),
                    audio_url: audioPath,
                    artwork_url: artworkPath,
                    notes: formData.get('notes')
                }]);

            if (dbErr) throw dbErr;

            alert("Gửi thành công! Nhạc của bạn đã được chuyển đến hệ thống của UNDERSOUTHERN.");
            form.reset();
            document.getElementById('audio-name').innerText = "Choose File";
            document.getElementById('artwork-name').innerText = "Choose Image";

        } catch (err) {
            console.error(err);
            alert("Lỗi: " + err.message);
        } finally {
            btnSubmit.disabled = false;
            btnSubmit.innerText = originalText;
        }
    };
</script>
</body>
</html>
