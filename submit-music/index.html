<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNDERSOUTHERN – Submit Music</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/phvinh1968-a11y/my-images/main/logoblack.png">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap');

        :root {
            --bg: #000000; 
            --text-main: #ffffff;
            --text-secondary: #888888;
            --line: #333333;
            --accent: #ffffff;
            --track-bg: #1a1a1a;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Fira Code', monospace;
            background-color: var(--bg); color: var(--text-main); margin: 0;
            padding: 60px 20px; display: flex; justify-content: center;
            text-transform: lowercase; letter-spacing: -0.02em; min-height: 100vh; position: relative;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.05; pointer-events: none; z-index: 999;
        }

        .submit-wrapper { width: 100%; max-width: 600px; position: relative; z-index: 1; }

        header { text-align: left; margin-bottom: 60px; border-left: 1px solid var(--accent); padding-left: 25px; }
        .header-logo { width: 60px; margin-bottom: 20px; filter: brightness(0) invert(1); }
        header h1 { font-size: clamp(24px, 5vw, 36px); font-weight: 500; margin: 0 0 10px 0; letter-spacing: -1.5px; }
        header p { font-size: 0.85rem; color: var(--text-secondary); margin: 0; line-height: 1.6; }

        .form-grid { display: flex; flex-direction: column; gap: 45px; width: 100%; }

        .form-group { position: relative; width: 100%; }
        .form-group label { 
            display: flex; align-items: center; font-size: 10px; color: var(--text-secondary); 
            margin-bottom: 12px; font-weight: 400; letter-spacing: 1px; text-transform: uppercase;
        }

        .help-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 14px; height: 14px; background-color: #ffffff; color: #000000;
            border-radius: 50%; font-size: 9px; font-weight: 800; margin-left: 8px; cursor: help;
            transition: 0.3s; position: relative;
        }
        .help-icon .tooltip {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 220px; background: #111; color: #ccc; padding: 12px;
            font-size: 9px; line-height: 1.4; text-transform: none;
            border: 1px solid var(--line); display: none; z-index: 100;
            pointer-events: none; box-shadow: 0 10px 20px rgba(0,0,0,0.5); font-weight: 400;
        }
        .help-icon:hover .tooltip { display: block; }

        .form-group input, .form-group select {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--line);
            padding: 12px 0; outline: none; font-size: 1rem; color: var(--text-main); 
            font-family: 'Fira Code', monospace; border-radius: 0; appearance: none;
        }

        .form-group textarea {
            width: 100%; background: transparent; border: 1px solid var(--line);
            padding: 15px; outline: none; font-size: 1rem; color: var(--text-main); 
            font-family: 'Fira Code', monospace; border-radius: 0; resize: none;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-bottom-color: var(--accent); }
        select option { background-color: #000; color: #fff; }

        .select-wrapper::after { content: '↓'; font-size: 10px; position: absolute; right: 0; bottom: 15px; color: var(--text-secondary); pointer-events: none; }

        .upload-item { width: 100%; }
        .action-btn {
            width: 100%; border: 1px dashed var(--line); padding: 35px 20px; text-align: center;
            cursor: pointer; color: var(--text-secondary); transition: 0.3s; display: block;
        }
        .action-btn:hover, .action-btn.filled { border-color: var(--accent); color: var(--accent); }

        .progress-track {
            width: 100%; height: 2px; background: var(--track-bg); 
            margin-top: 3px; position: relative; overflow: hidden;
        }
        .progress-fill {
            position: absolute; top: 0; left: 0; height: 100%; width: 0%;
            background: #ffffff; 
            box-shadow: 0 0 5px #fff;
            transition: width 0.3s ease;
        }

        .btn-submit { 
            background: var(--accent); color: #000; border: none; padding: 25px; 
            font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 80px; 
            width: 100%; letter-spacing: 2px; text-transform: uppercase; font-family: 'Fira Code', monospace;
        }
        .btn-submit:disabled { opacity: 0.5; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #000; border: 1px solid var(--line); width: 90%; max-width: 450px; padding: 40px; text-align: center; }

        footer { margin-top: 100px; text-align: center; font-size: 11px; color: #444; }
    </style>
</head>
<body>

<div class="submit-wrapper">
    <header>
        <img src="https://raw.githubusercontent.com/phvinh1968-a11y/my-images/main/logoblack.png" alt="logo" class="header-logo">
        <h1>single distribution</h1>
        <p>deliver your sound worldwide via UNDERSOUTHERN distribution partner.</p>
    </header>

    <form id="submit-form" onsubmit="handleFinalSubmit(event)">
        <div class="form-grid">
            
            <div class="form-group"><label>contact email</label><input type="email" id="contact-email" required></div>
            <div class="form-group"><label>song title</label><input type="text" id="main-title-input" required></div>

            <div class="form-group">
                <label>primary artist(s) <span class="help-icon">?<div class="tooltip">nghệ sĩ chính. nếu nhiều người, hãy cách bằng dấu phẩy.</div></span></label>
                <input type="text" id="main-primary-artist" required>
            </div>

            <div class="form-group">
                <label>featured artist(s) <span class="help-icon">?<div class="tooltip">nghệ sĩ khách mời (feat.). cách nhau bằng dấu phẩy.</div></span></label>
                <input type="text" id="main-featured-artist">
            </div>

            <div class="form-group">
                <label>composer / lyricist <span class="help-icon">?<div class="tooltip">ghi đúng họ và tên thật hợp pháp, cách nhau bằng dấu phẩy.</div></span></label>
                <input type="text" id="main-composers" required>
            </div>

            <div class="form-group"><label>producers</label><input type="text" id="main-producers"></div>

            <div class="form-group select-wrapper"><label>primary genre</label><select id="primary-genre" required><option value="" disabled selected></option></select></div>
            <div class="form-group select-wrapper"><label>language</label><select id="language-select" required><option value="" disabled selected></option></select></div>
            <div class="form-group"><label>planned release date</label><input type="date" id="release-date" required style="color-scheme: dark;"></div>

            <div class="form-group">
                <label>cover artwork</label>
                <div class="upload-item">
                    <div class="action-btn" id="art-btn" onclick="document.getElementById('artwork-file').click()">
                        <span id="art-status">click to select artwork</span>
                    </div>
                    <div class="progress-track"><div class="progress-fill" id="art-fill"></div></div>
                    <input type="file" id="artwork-file" hidden accept="image/*" required onchange="updateSelected('artwork-file', 'art-status', 'art-btn')">
                </div>
            </div>

            <div class="form-group">
                <label>audio file</label>
                <div class="upload-item">
                    <div class="action-btn" id="audio-btn" onclick="document.getElementById('audio-file').click()">
                        <span id="audio-status">click to select audio file</span>
                    </div>
                    <div class="progress-track"><div class="progress-fill" id="audio-fill"></div></div>
                    <input type="file" id="audio-file" hidden accept="audio/*" required onchange="updateSelected('audio-file', 'audio-status', 'audio-btn')">
                </div>
            </div>

            <div class="form-group"><label>lyrics</label><textarea id="lyric-input" style="height: 180px;" required></textarea></div>
            <div class="form-group"><label>note (optional)</label><textarea id="note-input" style="height: 100px;"></textarea></div>

        </div>

        <button type="submit" class="btn-submit" id="btn-submit">submit to undersouthern</button>
    </form>

    <footer>&copy; 2026 UNDERSOUTHERN. ALL RIGHTS RESERVED</footer>
</div>

<div class="modal-overlay" id="success-modal">
    <div class="modal-box">
        <h2>SUCCESSFUL</h2>
        <p style="color:#888; font-size:13px; line-height: 1.6; margin-bottom: 30px;">submission received and assets transmitted.</p>
        <button class="btn-submit" style="font-size: 11px; padding: 15px;" onclick="location.reload()">close</button>
    </div>
</div>

<script>
    // Cấu hình Appwrite dựa trên thông tin dự án của bạn
    const { Client, Databases, Storage, ID } = Appwrite;
    const client = new Client()
        .setEndpoint('https://sgp.cloud.appwrite.io/v1') // Endpoint Singapore
        .setProject('69ace729002e0c67e9e3');           // Project ID thực tế của bạn

    const databases = new Databases(client);
    const storage = new Storage(client);

    // Vui lòng đảm bảo các ID Bucket này khớp với ID bạn đã tạo trong Storage
    const BUCKET_ARTWORK = 'artworks'; 
    const BUCKET_AUDIO = 'music_files';

    function updateSelected(inputId, statusId, btnId) {
        const f = document.getElementById(inputId).files[0];
        if(f) {
            document.getElementById(statusId).innerText = f.name.toLowerCase();
            document.getElementById(btnId).classList.add('filled');
        }
    }

    async function handleFinalSubmit(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        const artStatus = document.getElementById('art-status');
        const audioStatus = document.getElementById('audio-status');
        const artFill = document.getElementById('art-fill');
        const audioFill = document.getElementById('audio-fill');

        btn.innerText = "TRANSMITTING..."; btn.disabled = true;

        try {
            // 1. Tải Artwork lên
            artStatus.innerText = "uploading artwork...";
            const artworkFile = document.getElementById('artwork-file').files[0];
            const uploadedArt = await storage.createFile(
                BUCKET_ARTWORK, 
                ID.unique(), 
                artworkFile,
                (p) => { artFill.style.width = p.progress + '%'; }
            );
            artStatus.innerText = "artwork transmitted";

            // 2. Tải Audio lên
            audioStatus.innerText = "uploading audio...";
            const audioFile = document.getElementById('audio-file').files[0];
            const uploadedAudio = await storage.createFile(
                BUCKET_AUDIO, 
                ID.unique(), 
                audioFile,
                (p) => { audioFill.style.width = p.progress + '%'; }
            );
            audioStatus.innerText = "audio transmitted";

            // 3. Gửi dữ liệu tới Database 'release'
            await databases.createDocument(
                'Submissions', // Database ID
                'release',     // Collection ID
                ID.unique(), 
                {
                    contact_email: document.getElementById('contact-email').value,
                    song_title: document.getElementById('main-title-input').value,
                    primary_artist: document.getElementById('main-primary-artist').value,
                    featured_artist: document.getElementById('main-featured-artist').value,
                    composer_lyricist: document.getElementById('main-composers').value,
                    producers: document.getElementById('main-producers').value,
                    primary_genre: document.getElementById('primary-genre').value,
                    language: document.getElementById('language-select').value,
                    release_date: document.getElementById('release-date').value,
                    artwork_id: uploadedArt.$id, // Lưu ID file ảnh
                    audio_id: uploadedAudio.$id, // Lưu ID file nhạc
                    lyrics: document.getElementById('lyric-input').value,
                    notes: document.getElementById('note-input').value,
                    status: 'pending'
                }
            );

            document.getElementById('success-modal').style.display = 'flex';
        } catch (err) { 
            console.error(err);
            alert("transmission failed: " + err.message); 
        } finally { 
            btn.innerText = "submit to undersouthern"; btn.disabled = false; 
        }
    }

    window.onload = () => {
        const pg = document.getElementById('primary-genre'), ls = document.getElementById('language-select');
        const genres = ["Hip-Hop/Rap", "Indie", "Pop", "R&B", "Lo-fi", "Electronic", "Soul"];
        const languages = ["Vietnamese (VI)", "English (EN)", "Korean (KO)", "Japanese (JP)"];
        
        genres.forEach(g => pg.add(new Option(g.toLowerCase(), g)));
        languages.forEach(l => ls.add(new Option(l.toLowerCase(), l)));
    };
</script>
</body>
</html>
