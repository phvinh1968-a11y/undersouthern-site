<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undersouthern - Submit Music</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/phvinh1968-a11y/my-images/main/logoblack.png">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>

    <style>
        :root {
            --bg: #f4f4f2; 
            --card-bg: #ecece9;
            --text-main: #1a1a1a;
            --text-secondary: #6b6b6b;
            --line: #dcdcdc;
            --accent: #000000;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: -apple-system, blinkmacsystemfont, "inter", sans-serif;
            background-color: var(--bg); color: var(--text-main); margin: 0;
            padding: 40px 40px; display: flex; justify-content: center;
            text-transform: lowercase; letter-spacing: -0.01em; min-height: 100vh; position: relative;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.03; pointer-events: none; z-index: 999;
        }

        .submit-wrapper { width: 100%; max-width: 1000px; position: relative; z-index: 1; }
        header { text-align: center; margin-bottom: 35px; }
        .header-logo { width: 100px; margin: 0 auto 8px auto; display: block; filter: grayscale(1) contrast(1.1); }
        header h1 { font-size: 2.2rem; font-weight: 600; margin: 0 0 8px 0; line-height: 1; letter-spacing: -0.02em; }
        header p { font-size: 0.85rem; color: var(--text-secondary); margin: 0; }

        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px 40px; }
        .full-width { grid-column: span 2; }

        .form-group { position: relative; }
        .form-group label { display: flex; align-items: center; font-size: 0.72rem; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; letter-spacing: 0.05em; height: 14px; }
        
        /* Help Icon & Tooltips */
        .help-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 14px; height: 14px; border: 1px solid var(--text-secondary);
            border-radius: 50%; font-size: 9px; margin-left: 6px; cursor: pointer; 
            transition: 0.2s; position: relative;
        }
        .help-icon:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

        .artwork-tooltip, .explicit-tooltip, .audio-tooltip {
            position: absolute; top: 20px; left: 0; width: 320px; 
            background: #1a1a1a; color: #fff; padding: 12px 15px; z-index: 100; 
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            text-transform: none; pointer-events: none;
        }

        .help-icon:hover .artwork-tooltip, 
        .help-icon:hover .explicit-tooltip,
        .help-icon:hover .audio-tooltip { display: block; animation: fadeIn 0.2s ease; }

        .artwork-tooltip b, .explicit-tooltip b, .audio-tooltip b { font-size: 0.7rem; color: #fff; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        .artwork-tooltip ul, .explicit-tooltip ul, .audio-tooltip ul { margin: 0; padding: 0; list-style: none; }
        .artwork-tooltip li, .explicit-tooltip li, .audio-tooltip li { font-size: 0.65rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artwork-tooltip li::before, .explicit-tooltip li::before, .audio-tooltip li::before { content: "•"; margin-right: 8px; color: var(--text-secondary); }

        .form-group input, .form-group select, .tag {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--line);
            padding: 8px 0; outline: none; font-size: 1rem; transition: border-bottom 0.3s;
            appearance: none; border-radius: 0; text-transform: none !important; 
        }
        .form-group input::placeholder { text-transform: lowercase; }
        .form-group input:focus, .form-group select:focus { border-bottom-color: var(--accent); }
        .select-wrapper::after { content: '▼'; font-size: 0.5rem; position: absolute; right: 0; bottom: 12px; color: var(--text-secondary); pointer-events: none; }

        .tags-container {
            display: flex; flex-wrap: wrap; gap: 6px; border-bottom: 1px solid var(--line);
            padding-bottom: 5px; min-height: 38px; align-items: center; cursor: text;
        }
        .tag { background: var(--accent); color: #fff; font-size: 0.75rem; padding: 3px 8px; display: flex; align-items: center; gap: 6px; border-radius: 2px; width: auto; }
        .tag span { cursor: pointer; font-weight: bold; font-size: 10px; opacity: 0.7; }
        .tags-container input { border: none !important; width: auto !important; flex: 1; min-width: 60px; padding: 5px 0 !important; }

        .artwork-upload-box {
            width: 160px; height: 160px; background: var(--card-bg); border: 1px solid var(--line);
            display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; text-align: center;
        }
        .artwork-upload-box span { font-size: 0.65rem; color: var(--text-secondary); padding: 10px; }
        .artwork-upload-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; display: none; }
        .remove-art-btn { position: absolute; top: 5px; right: 5px; width: 20px; height: 20px; background: rgba(0,0,0,0.7); color: #fff; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; z-index: 10; }

        /* --- TRACKS SECTION --- */
        .tracks-section { margin-top: 40px; border-top: 1px solid var(--line); padding-top: 20px; }
        .track-row { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr) 100px 80px 40px; 
            gap: 15px; align-items: flex-end; margin-bottom: 30px; 
            padding: 15px; background: rgba(0,0,0,0.02); border-radius: 4px; animation: fadeIn 0.3s ease; 
        }
        .track-row .form-group label { font-size: 0.6rem; margin-bottom: 8px; color: var(--text-secondary); }

        .action-btn { 
            cursor: pointer; border: 1px solid var(--line); padding: 8px; 
            text-align: center; border-radius: 2px; background: #fff; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; height: 38px;
        }
        .action-btn:hover { border-color: var(--accent); }
        .action-btn span { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); }
        .action-btn.filled { border-color: var(--accent); }
        .action-btn.filled span { color: var(--accent); }

        .remove-track-btn { cursor: pointer; color: #b3261e; font-size: 1rem; text-align: center; display: flex; align-items: center; justify-content: center; height: 38px; }

        /* --- MODAL LYRICS --- */
        .lyric-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            z-index: 2000; display: none; align-items: center; justify-content: center;
        }
        .lyric-modal-box {
            background: var(--bg); width: 90%; max-width: 500px; padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); animation: fadeIn 0.3s ease;
        }
        .lyric-modal-box h3 { margin: 0 0 15px 0; font-size: 1.1rem; }
        .lyric-modal-box textarea {
            width: 100%; height: 300px; background: transparent; border: 1px solid var(--line);
            padding: 15px; outline: none; font-size: 0.9rem; resize: none; font-family: inherit;
        }
        .lyric-modal-box textarea:focus { border-color: var(--accent); }
        .lyric-modal-btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

        .btn-add-track { background: transparent; border: 1px dashed var(--line); color: var(--text-secondary); width: 100%; padding: 12px; font-size: 0.75rem; cursor: pointer; margin-top: 10px; }
        .btn-submit { background: var(--accent); color: #fff; border: none; padding: 18px; font-size: 0.85rem; font-weight: 600; cursor: pointer; margin-top: 40px; width: 100%; transition: opacity 0.2s; letter-spacing: 0.1em; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: var(--bg); border: 1px solid var(--accent); width: 90%; max-width: 450px; padding: 30px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.15); animation: fadeIn 0.3s ease; text-transform: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        footer { margin-top: 60px; display: flex; justify-content: center; font-size: 0.65rem; color: var(--text-secondary); }
    </style>
</head>
<body>

<div class="submit-wrapper">
    <header>
        <img src="https://raw.githubusercontent.com/phvinh1968-a11y/my-images/main/logoblack.png" alt="logo" class="header-logo">
        <h1>submit for distribution</h1>
        <p>distribute your music to 45+ digital streaming platforms worldwide</p>
    </header>

    <form id="submit-form" onsubmit="handleFinalSubmit(event)">
        <div class="form-grid">
            <div class="form-group full-width">
                <label>contact email</label>
                <input type="email" id="contact-email" placeholder="your@example.com" required>
            </div>

            <div class="form-group">
                <label>cover artwork 
                    <div class="help-icon">?
                        <div class="artwork-tooltip">
                            <b>Artwork Requirements:</b>
                            <ul>
                                <li>Formats: JPG, PNG</li>
                                <li>Size: 1000x1000 to 4000x4000</li>
                                <li>Must be a perfect square</li>
                                <li>No logos or brand references</li>
                            </ul>
                        </div>
                    </div>
                </label>
                <div class="artwork-upload-box" id="art-box" onclick="document.getElementById('artwork-file').click()">
                    <span id="art-txt">upload artwork</span>
                    <img id="preview-img">
                    <div id="remove-btn" class="remove-art-btn" onclick="removeArt(event)">✕</div>
                    <input type="file" id="artwork-file" hidden accept="image/*" onchange="previewArt(this)">
                </div>
            </div>

            <div class="form-group select-wrapper" style="align-self: flex-start;">
                <label>release type</label>
                <select id="release-type" onchange="handleTypeLogic()" required>
                    <option value="single" selected>single</option>
                    <option value="ep">ep</option>
                    <option value="album">album</option>
                </select>
            </div>

            <div class="form-group">
                <label id="title-label">single title</label>
                <input type="text" id="main-title-input" placeholder="eg. your song name" required>
            </div>
            <div class="form-group">
                <label>title version</label>
                <input type="text" id="title-version" placeholder="eg. Radio Edit, Remix">
            </div>

            <div class="form-group">
                <label>primary artist</label>
                <div class="tags-container" id="main-primary-artist" onclick="this.querySelector('input').focus()">
                    <input type="text" class="tag-input" placeholder="add artist + press enter">
                </div>
            </div>

            <div class="form-group">
                <label>featured artist</label>
                <div class="tags-container" id="main-featured-artist" onclick="this.querySelector('input').focus()">
                    <input type="text" class="tag-input" placeholder="add artist + press enter">
                </div>
            </div>

            <div class="form-group select-wrapper">
                <label>primary genre</label>
                <select id="primary-genre" required><option value="" disabled selected>select genre</option></select>
            </div>
            <div class="form-group select-wrapper">
                <label>secondary genre</label>
                <select id="secondary-genre"><option value="" selected>optional</option></select>
            </div>

            <div class="form-group">
                <label>producer</label>
                <div class="tags-container" id="main-producers" onclick="this.querySelector('input').focus()">
                    <input type="text" class="tag-input" placeholder="add producer + press enter">
                </div>
            </div>

            <div class="form-group select-wrapper">
                <label>language</label>
                <select id="language-select" required>
                    <option value="" disabled selected>select language</option>
                </select>
            </div>

            <div class="form-group select-wrapper">
                <label>explicit content 
                    <div class="help-icon">?
                        <div class="explicit-tooltip">
                            <b>Explicit Content Guide:</b>
                            <ul>
                                <li>Yes: contains strong language / violence</li>
                                <li>No: suitable for all ages / no profanity</li>
                                <li>Cleaned: edited version to remove profanity</li>
                            </ul>
                        </div>
                    </div>
                </label>
                <select id="is-explicit" required>
                    <option value="no" selected>no</option><option value="yes">yes</option><option value="cleaned">cleaned</option>
                </select>
            </div>
            <div class="form-group">
                <label>release date</label>
                <input type="date" id="release-date" required style="color: var(--text-secondary);">
            </div>

            <div class="form-group full-width tracks-section">
                <label id="audio-label">audio tracks management</label>
                <div id="tracks-container"></div>
                <button type="button" id="add-track-btn" class="btn-add-track" onclick="addTrackRow()">+ add track</button>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="btn-submit">submit for distribution</button>
    </form>

    <footer><span>&copy; 2026 undersouthern</span></footer>
</div>

<div class="lyric-modal-overlay" id="lyric-modal">
    <div class="lyric-modal-box">
        <h3 id="lyric-track-title">enter lyrics</h3>
        <textarea id="lyric-input" placeholder="paste lyrics here..."></textarea>
        <div class="lyric-modal-btns">
            <button class="action-btn" onclick="closeLyricModal()"><span>cancel</span></button>
            <button class="action-btn filled" onclick="saveLyrics()"><span>save lyrics</span></button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="success-modal">
    <div class="modal-box">
        <h2>submission successful</h2>
        <p>Your content has been prepared for upload. Please send a notification to <span class="email-highlight">support@undersouthern.asia</span> to finalize your release.</p>
        <div class="modal-btns">
            <button class="btn-modal" onclick="closeModal()">close</button>
            <button class="btn-modal primary" onclick="window.location.href='mailto:support@undersouthern.asia?subject=Release Submission for Review'">open mail</button>
        </div>
    </div>
</div>

<script>
    const { Client, Databases, Storage, ID } = Appwrite;
    const client = new Client();
    client.setEndpoint('https://cloud.appwrite.io/v1').setProject('YOUR_PROJECT_ID');
    const databases = new Databases(client);
    const storage = new Storage(client);

    const DATABASE_ID = 'YOUR_DATABASE_ID';
    const COLLECTION_RELEASES_ID = 'YOUR_RELEASES_COLLECTION_ID';
    const COLLECTION_TRACKS_ID = 'YOUR_TRACKS_COLLECTION_ID';
    const BUCKET_ARTWORKS_ID = 'YOUR_ARTWORKS_BUCKET_ID';
    const BUCKET_AUDIO_ID = 'YOUR_AUDIO_BUCKET_ID';

    const genres = ["Alternative", "Alternative Rock", "Dance", "Electronic", "Hip-Hop/Rap", "Indie", "Jazz", "K-Pop", "Latin", "Metal", "Pop", "R&B", "Reggae", "Rock", "Soul", "Soundtrack", "World"];
    const languages = ["Vietnamese (VI)", "English (EN)", "Korean (KO)", "Japanese (JA)"];

    let trackCount = 0;
    let currentLyricTrackId = null;
    let trackLyrics = {}; 

    function populateDropdowns() {
        const pGenre = document.getElementById('primary-genre');
        const sGenre = document.getElementById('secondary-genre');
        genres.forEach(g => { pGenre.add(new Option(g, g)); sGenre.add(new Option(g, g)); });
        const langSelect = document.getElementById('language-select');
        languages.forEach(l => { langSelect.add(new Option(l, l)); });
    }

    function openLyricModal(id) {
        currentLyricTrackId = id;
        const songTitle = document.querySelector(`#track-row-${id} input[placeholder="track name"]`).value;
        document.getElementById('lyric-track-title').innerText = songTitle ? `lyrics: ${songTitle}` : "enter lyrics";
        document.getElementById('lyric-input').value = trackLyrics[id] || "";
        document.getElementById('lyric-modal').style.display = 'flex';
    }

    function closeLyricModal() { document.getElementById('lyric-modal').style.display = 'none'; }

    function saveLyrics() {
        const val = document.getElementById('lyric-input').value.trim();
        if (val) {
            trackLyrics[currentLyricTrackId] = val;
            document.getElementById(`lyric-btn-${currentLyricTrackId}`).classList.add('filled');
            document.getElementById(`lyric-btn-status-${currentLyricTrackId}`).innerText = "ready";
            closeLyricModal();
        } else {
            alert("lyrics are required!");
        }
    }

    async function handleFinalSubmit(e) {
        e.preventDefault();
        const trackRows = document.querySelectorAll('.track-row');
        for (let row of trackRows) {
            const id = row.id.split('-').pop();
            if (!trackLyrics[id]) { alert("please provide lyrics for all tracks!"); return; }
        }

        const btn = document.getElementById('btn-submit');
        btn.innerText = "uploading..."; btn.disabled = true;

        try {
            const artFile = document.getElementById('artwork-file').files[0];
            let artworkFileId = "";
            if (artFile) {
                const uploadedArt = await storage.createFile(BUCKET_ARTWORKS_ID, ID.unique(), artFile);
                artworkFileId = uploadedArt.$id;
            }

            const releaseData = {
                contact_email: document.getElementById('contact-email').value,
                artwork_id: artworkFileId,
                release_type: document.getElementById('release-type').value,
                title: document.getElementById('main-title-input').value,
                version: document.getElementById('title-version').value,
                primary_artists: getTags('main-primary-artist'),
                featured_artists: getTags('main-featured-artist'),
                genres: [document.getElementById('primary-genre').value, document.getElementById('secondary-genre').value].filter(g => g),
                producers: getTags('main-producers'),
                language: document.getElementById('language-select').value,
                is_explicit: document.getElementById('is-explicit').value,
                release_date: document.getElementById('release-date').value
            };

            const relResponse = await databases.createDocument(DATABASE_ID, COLLECTION_RELEASES_ID, ID.unique(), releaseData);
            const releaseId = relResponse.$id;

            for (let i = 0; i < trackRows.length; i++) {
                const row = trackRows[i];
                const trackIdNum = row.id.split('-').pop();
                const audioFile = document.getElementById(`file-${trackIdNum}`).files[0];
                let audioFileId = "";
                if (audioFile) {
                    const uploadedAudio = await storage.createFile(BUCKET_AUDIO_ID, ID.unique(), audioFile);
                    audioFileId = uploadedAudio.$id;
                }
                
                await databases.createDocument(DATABASE_ID, COLLECTION_TRACKS_ID, ID.unique(), {
                    release_id: releaseId,
                    song_title: row.querySelector('input[placeholder="track name"]').value,
                    track_primary_artists: Array.from(row.querySelectorAll('.tags-container')[0].querySelectorAll('.tag')).map(t => t.innerText.replace('✕', '').trim()),
                    track_featured_artists: Array.from(row.querySelectorAll('.tags-container')[1].querySelectorAll('.tag')).map(t => t.innerText.replace('✕', '').trim()),
                    track_producers: Array.from(row.querySelectorAll('.tags-container')[2].querySelectorAll('.tag')).map(t => t.innerText.replace('✕', '').trim()),
                    audio_id: audioFileId,
                    lyrics: trackLyrics[trackIdNum],
                    sort_order: i + 1
                });
            }
            document.getElementById('success-modal').style.display = 'flex';
        } catch (error) { alert("Error: " + error.message); }
        finally { btn.innerText = "submit for distribution"; btn.disabled = false; }
    }

    function addTrackRow() {
        trackCount++;
        const container = document.getElementById('tracks-container');
        const row = document.createElement('div'); row.className = 'track-row'; row.id = `track-row-${trackCount}`;
        row.innerHTML = `
            <div class="form-group"><label>song title</label><input type="text" placeholder="track name" required></div>
            <div class="form-group"><label>primary artist</label><div class="tags-container" onclick="this.querySelector('input').focus()"><input type="text" class="tag-input" placeholder="press enter"></div></div>
            <div class="form-group"><label>featured artist</label><div class="tags-container" onclick="this.querySelector('input').focus()"><input type="text" class="tag-input" placeholder="press enter"></div></div>
            <div class="form-group"><label>producer</label><div class="tags-container" onclick="this.querySelector('input').focus()"><input type="text" class="tag-input" placeholder="press enter"></div></div>
            
            <div class="form-group">
                <label>audio <div class="help-icon">?
                    <div class="audio-tooltip">
                        <b>Audio Requirements:</b>
                        <ul>
                            <li>Click to Select</li>
                            <li>Stereo</li>
                            <li>At least 16 bit</li>
                            <li>At least 44.1 kHz</li>
                        </ul>
                    </div>
                </div></label>
                <div class="action-btn" id="audio-btn-${trackCount}" onclick="document.getElementById('file-${trackCount}').click()">
                    <span id="file-status-${trackCount}">audio</span>
                    <input type="file" id="file-${trackCount}" hidden accept="audio/*" onchange="updateTrackStatus(${trackCount})">
                </div>
            </div>

            <div class="form-group">
                <label>lyrics</label>
                <div class="action-btn" id="lyric-btn-${trackCount}" onclick="openLyricModal(${trackCount})">
                    <span id="lyric-btn-status-${trackCount}">lyrics</span>
                </div>
            </div>

            <div class="remove-track-btn" onclick="removeRow(${trackCount})">✕</div>
        `;
        container.appendChild(row); row.querySelectorAll('.tags-container').forEach(initTagSystem);
    }

    function removeRow(id) { 
        if (document.getElementById('tracks-container').children.length > 1) {
            document.getElementById(`track-row-${id}`).remove(); 
            delete trackLyrics[id];
        }
    }

    function updateTrackStatus(id) { 
        const input = document.getElementById(`file-${id}`); 
        if (input.files.length > 0) { 
            document.getElementById(`audio-btn-${id}`).classList.add('filled');
            document.getElementById(`file-status-${id}`).innerText = "ready"; 
        } 
    }

    function getTags(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return [];
        return Array.from(container.querySelectorAll('.tag')).map(t => t.innerText.replace('✕', '').trim());
    }

    function initTagSystem(container) {
        const input = container.querySelector('input');
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const val = input.value.trim();
                if (val) {
                    const tag = document.createElement('div'); tag.className = 'tag';
                    tag.innerHTML = `${val} <span onclick="this.parentElement.remove()">✕</span>`;
                    container.insertBefore(tag, input); input.value = '';
                }
            }
            if (e.key === 'Backspace' && !input.value) { const tags = container.querySelectorAll('.tag'); if (tags.length > 0) tags[tags.length - 1].remove(); }
        });
    }

    function handleTypeLogic() {
        const type = document.getElementById('release-type').value;
        const tl = document.getElementById('title-label'); const al = document.getElementById('audio-label'); const ti = document.getElementById('main-title-input');
        document.getElementById('tracks-container').innerHTML = ""; trackCount = 0;
        if (type === 'single') { tl.innerText = 'single title'; al.innerText = 'audio access (single file)'; ti.placeholder = 'eg. your song name'; }
        else { const isEP = type === 'ep'; tl.innerText = isEP ? 'ep title' : 'album title'; al.innerText = isEP ? 'ep tracks management' : 'album tracks management'; ti.placeholder = isEP ? 'eg. your ep name' : 'eg. your album name'; }
        addTrackRow();
    }

    function previewArt(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                const p = document.getElementById('preview-img'); p.src = e.target.result; p.style.display = 'block';
                document.getElementById('art-txt').style.display = 'none'; document.getElementById('remove-btn').style.display = 'flex';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function removeArt(e) { e.stopPropagation(); document.getElementById('artwork-file').value = ""; const p = document.getElementById('preview-img'); p.src = ""; p.style.display = 'none'; document.getElementById('art-txt').style.display = 'block'; document.getElementById('remove-btn').style.display = 'none'; }

    window.onload = () => { populateDropdowns(); document.querySelectorAll('.tags-container').forEach(initTagSystem); handleTypeLogic(); };
</script>

</body>
</html>
